services:
  postgres:
    image: postgres:17
    restart: always
    container_name: postgres
    environment:
      POSTGRES_USER: trimly
      POSTGRES_PASSWORD: trimly24291406
      POSTGRES_DB: trimly
    ports:
      - "5432:5432"
    volumes:
      - trimly-pgdata:/var/lib/postgresql/data
    networks:
      - trimly-network

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - trimly-network
    
networks:
  trimly-network:

volumes:
  trimly-pgdata: